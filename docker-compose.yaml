services:
  postgres:
    build:
      context: ./database
      dockerfile: dockerfile
    container_name: datahub-postgres
    ports:
      - "31234:5432"
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/config/pg_hba.conf:/etc/postgresql/pg_hba.conf
    restart: unless-stopped
    networks:
      - datahub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 0.0.0.0 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile.backend
    container_name: datahub-backend
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    networks:
      - datahub
    depends_on:
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 500M

  migrate:
    build:
      context: ./backend
      dockerfile: dockerfile.backend
      target: migrate
    container_name: datahub-migrate
    env_file: .env
    restart: "no"
    networks:
      - datahub
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

networks:
  datahub:
    driver: bridge
